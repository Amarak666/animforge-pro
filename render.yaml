# === Только воркеры — фронт на Vercel, БД на Supabase ===

services:
  # === BullMQ Queue Worker ===
  - type: worker
    name: animforge-queue-worker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npx tsx lib/queue/worker.ts
    envVars:
      - key: DATABASE_URL
        sync: false  # Supabase connection string
      - key: REDIS_URL
        sync: false  # Upstash Redis URL
      - key: HF_TOKEN
        sync: false
      - key: BLENDER_WORKER_URL
        sync: false  # URL blender-worker на Render

  # === Python Blender Worker ===
  - type: web
    name: blender-worker
    runtime: docker
    plan: free
    dockerfilePath: ./workers/blender/Dockerfile
    dockerContext: ./workers/blender
    envVars:
      - key: PORT
        value: "10000"
    healthCheckPath: /health
